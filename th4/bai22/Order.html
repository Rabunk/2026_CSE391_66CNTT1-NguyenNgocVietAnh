<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Form Đặt Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>Đặt Hàng</h2>

        <form id="orderForm">

            <div class="mb-3">
                <label>Sản phẩm</label>
                <select id="product" class="form-select">
                    <option value="">-- Chọn sản phẩm --</option>
                    <option value="ao">Áo</option>
                    <option value="quan">Quần</option>
                    <option value="giay">Giày</option>
                </select>
                <small class="text-danger" id="productError"></small>
            </div>

            <div class="mb-3">
                <label>Số lượng</label>
                <input type="number" id="quantity" class="form-control" min="1" max="99">
                <small class="text-danger" id="quantityError"></small>
            </div>

            <div class="mb-3">
                <label>Ngày giao hàng</label>
                <input type="date" id="deliveryDate" class="form-control">
                <small class="text-danger" id="dateError"></small>
            </div>

            <div class="mb-3">
                <label>Địa chỉ giao</label>
                <textarea id="address" class="form-control"></textarea>
                <small class="text-danger" id="addressError"></small>
            </div>

            <div class="mb-3">
                <label>Ghi chú</label>
                <textarea id="note" class="form-control"></textarea>

                <div>
                    <span id="charCount">0</span>/200
                </div>

                <small class="text-danger" id="noteError"></small>
            </div>

            <div class="mb-3">
                <label>Thanh toán</label><br>

                <input type="radio" name="payment" value="cod"> COD
                <input type="radio" name="payment" value="bank"> Chuyển khoản
                <input type="radio" name="payment" value="wallet"> Ví điện tử

                <br>
                <small class="text-danger" id="paymentError"></small>
            </div>

            <div class="mb-3">
                <b>Tổng tiền: </b>
                <span id="totalPrice">0</span> VND
            </div>

            <button class="btn btn-primary">Đặt hàng</button>

        </form>

        <div id="confirmBox" class="alert alert-warning mt-4" style="display:none"></div>

        <div id="successMessage" class="alert alert-success mt-4" style="display:none"></div>

    </div>

    <script src="main.js"></script>

</body>

</html>
