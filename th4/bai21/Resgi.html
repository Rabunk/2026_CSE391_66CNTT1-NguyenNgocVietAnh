<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Form Đăng Ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h2>Đăng ký tài khoản</h2>
        <form id="registerForm">
            <div class="mb-3">
                <label>Họ và tên</label>
                <input type="text" id="fullname" class="form-control" maxlength="50">
                <span id="charCount">0</span>/50
                <small class="text-danger" id="fullnameError"></small>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="text" id="email" class="form-control">
                <small class="text-danger" id="emailError"></small>
            </div>
            <div class="mb-3">
                <label>Số điện thoại</label>
                <input type="text" id="phone" class="form-control">
                <small class="text-danger" id="phoneError"></small>
            </div>
            <div class="mb-3">
                <label>Mật khẩu</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control">
                    <button type="button" id="togglePassword" class="btn btn-outline-secondary rounded-end">👁</button>
                </div>
                <div class="progress mt-2">
                    <div id="strengthBar" class="progress-bar"></div>
                </div>
                <small id="strengthText"></small>
                <small class="text-danger" id="passwordError"></small>
            </div>
            <div class="mb-3">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" class="form-control">
                <small class="text-danger" id="confirmPasswordError"></small>
            </div>
            <div class="mb-3">
                <label>Giới tính</label><br>
                <input type="radio" name="gender" value="male"> Nam
                <input type="radio" name="gender" value="female"> Nữ
                <br>
                <small class="text-danger" id="genderError"></small>
            </div>
            <div class="mb-3">
                <input type="checkbox" id="terms">
                Tôi đồng ý điều khoản
                <br>
                <small class="text-danger" id="termsError"></small>
            </div>
            <button class="btn btn-primary">Đăng ký</button>
        </form>
        <div id="successMessage" class="alert alert-success mt-3 d-none"></div>
    </div>
    <script src="main.js"></script>
</body>

</html>
