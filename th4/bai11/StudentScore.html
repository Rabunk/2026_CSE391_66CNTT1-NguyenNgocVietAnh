<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bảng điểm sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
<div class="container">
    <h1 class="text-center my-4">Bảng Điểm Sinh Viên</h1>

    <div class="input-group mb-3">
        <input type="text" id="nameInput" class="form-control" placeholder="Họ tên">
        <input type="number" id="scoreInput" class="form-control" placeholder="Điểm (0-10)" min="0" max="10">
        <button id="btnAdd" class="btn btn-primary">Thêm</button>
    </div>

    <table class="table table-hover">
        <thead class="table-primary">
        <tr>
            <th>STT</th>
            <th>Họ tên</th>
            <th>Điểm</th>
            <th>Xếp loại</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="mt-3">
        <b>Tổng sinh viên:</b> <span id="totalStudent">0</span> |
        <b>Điểm trung bình:</b> <span id="avgScore">0</span>
    </div>

</div>

<script src="main.js"></script>
</body>
</html>
