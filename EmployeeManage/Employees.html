<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Danh sách sinh viên</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<div class="modal fade" id="employeeModal" tabindex="-1" aria-labelledby="employeeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="formTitle">Thêm nhân sự mới</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>

            <form id="employeeForm">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="nameInput" class="form-label">Họ tên</label>
                            <input type="text" class="form-control" id="nameInput" placeholder="Nhập họ tên">
                        </div>

                        <div class="col-md-6">
                            <label for="emailInput" class="form-label">Email</label>
                            <input type="email" class="form-control" id="emailInput" placeholder="Nhập email">
                        </div>

                        <div class="col-md-6">
                            <label for="phoneInput" class="form-label">Số điện thoại</label>
                            <input type="text" class="form-control" id="phoneInput" placeholder="Nhập số điện thoại">
                        </div>

                        <div class="col-md-6">
                            <label for="positionInput" class="form-label">Vị trí</label>
                            <select class="form-select" id="positionInput">
                                <option value="" selected>-- Chọn vị trí --</option>
                                <option value="Nhân viên">Nhân viên</option>
                                <option value="Quản lý">Quản lý</option>
                                <option value="Giám đốc">Giám đốc</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label d-block">Giới tính</label>
                            <div class="form-check form-check-inline mt-1">
                                <input class="form-check-input" type="radio" name="gender" id="genderNam" value="Nam"
                                    checked>
                                <label class="form-check-label" border for="genderNam">Nam</label>
                            </div>
                            <div class="form-check form-check-inline mt-1">
                                <input class="form-check-input" type="radio" name="gender" id="genderNu" value="Nữ">
                                <label class="form-check-label" for="genderNu">Nữ</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-success px-4">Lưu</button>
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Hủy</button>
                </div>
            </form>
        </div>
    </div>
</div>

<body>
    <header class="app-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-4">
                <h1 class="fw-bold text-white">Quản lý nhân sự</h1>
                <h2 class="fw-normal text-white-50"><a class="fw-normal text-white-50 text-decoration-none"
                        href="#">Trang chủ</a></h2>
                <h3 class="fw-light text-white-50"><a href="#" class="text-white-50 text-decoration-none">Liên hệ</a>
                </h3>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="">
                    <input id="searchInput" type="text" class="form-control " placeholder="Tìm kiếm...">

                </div>
                <button id="searchBtn" class="btn bg-primary text-white">Tìm</button>
            </div>
        </div>
    </header>
    <main class="container mt-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h2 class="mb-0">Danh sách nhân sự</h2>
            <button id="addEmployBtn" class="btn bg-primary text-white"> <i class="bi bi-plus"></i>Thêm mới</button>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        ...
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary">Save changes</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card shadow-lg">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="EmployeeTable">
                        <thead class="table-light">
                            <tr>
                                <th>STT</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>SĐT</th>
                                <th>Vị trí</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <div id="noData" class="text-center text-muted py-4" style="display: none;">
                        <i class="bi bi-exclamation-circle"></i> Không có dữ liệu
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>

</html>
