<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Danh sách sinh viên</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-header">
        <div class="container d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Student Management</h5>
            <a href="register-student.html" class="btn btn-primary btn-sm">
                <i class="bi bi-person-plus"></i> Add Student
            </a>
        </div>
    </header>

    <main class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="card-title mb-0">Danh sách sinh viên</h3>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="studentTable">
                        <thead class="table-light">
                            <tr>
                                <th>Tên</th>
                                <th>Mã SV</th>
                                <th>Email</th>
                                <th>Điện thoại</th>
                                <th>Ngành</th>
                                <th>Giới tính</th>
                                <th class="text-end">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div id="emptyState" class="text-center text-muted py-4">
                    Không có sinh viên. Nhấn <strong>+ Add Student</strong> để thêm.
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
