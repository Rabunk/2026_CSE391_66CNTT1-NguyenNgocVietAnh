<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>hello world</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container mt-5">
        <div class="contact-form">
            <h5 class="mb-4">Get in touch with us by filling contact form below</h5>
            <form>
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control rounded-0" placeholder="* Enter your full name">
                    </div>
                    <div class="col-md-6">
                        <input type="email" class="form-control rounded-0" placeholder="* Enter your email address">
                    </div>
                    <div class="col-12">
                        <input type="text" class="form-control rounded-0" placeholder="Enter your subject">
                    </div>
                    <div class="col-12">
                        <textarea class="form-control rounded-0" rows="8" placeholder="* Your message here..."></textarea>
                    </div>
                    <div class="col-12 d-flex justify-content-between align-items-center">
                        <button class="btn btn-primary px-4">Send message</button>
                        <small class="text-muted">
                            * Please fill all required form field, thanks!
                        </small>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
